name: Deploy docs
on:
  push:
    branches: [ main ]
    paths:
      - docs/**
      - overrides/**
      - Scripts/**
      - mkdocs.yml
      - mkdocs_hooks.py
      - package.json
      - package-lock.json
      - requirements.txt
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate homepage from nav
        run: python3 generate_homepage.py
      - run: python3 -m mkdocs build --strict
      - name: Build Pagefind index
        run: npx -y pagefind --site site
      - name: Validate scope markers
        run: python3 Scripts/check_search_scopes.py --site-dir site
      - name: Run Pagefind smoke checks
        run: node Scripts/check_pagefind_smoke.mjs --site site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
